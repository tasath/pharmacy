<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a5f3f">
<title>Συνταγές ΙΔΙΚΑ</title>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<style>
:root {
  --green: #1a5f3f;
  --green2: #2d8a5e;
  --green-light: #e8f5ee;
  --bg: #f2f2f7;
  --surface: #fff;
  --border: #e0e0e5;
  --text: #1a1a2e;
  --text2: #6b6b80;
  --text3: #ababbb;
  --danger: #d0021b;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.header {
  background: var(--green); padding: 16px 16px 12px;
  display: flex; align-items: center; gap: 12px;
}
.header-icon { width: 38px; height: 38px; background: rgba(255,255,255,0.2); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.header h1 { font-size: 18px; font-weight: 600; color: #fff; }
.header p { font-size: 11px; color: rgba(255,255,255,0.7); }

/* Screens */
.screen { display: none; padding: 14px; padding-bottom: 80px; }
.screen.active { display: block; }

/* Cards */
.card { background: var(--surface); border-radius: var(--radius); margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); overflow: hidden; }
.card-head { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; display: flex; justify-content: space-between; align-items: center; }
.card-body { padding: 16px; }

/* Buttons */
.btn-big { width: 100%; padding: 16px; background: var(--green); color: #fff; border: none; border-radius: 12px; font-size: 17px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 8px; font-family: inherit; }
.btn-big:active { background: var(--green2); }
.btn-big:disabled { opacity: 0.4; }
.btn { padding: 11px 16px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 14px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px; font-family: inherit; }
.btn:active { background: var(--bg); }
.btn.primary { background: var(--green); color: #fff; border-color: var(--green); }
.btn.primary:active { background: var(--green2); }
.btn.danger { color: var(--danger); border-color: #ffd0d0; background: #fff0f0; }
.btn-row { display: flex; gap: 8px; margin-top: 10px; }
.btn-row .btn { flex: 1; }
.btn-full { width: 100%; margin-bottom: 8px; }

/* Camera */
.cam-wrap { position: relative; width: 100%; background: #000; border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
#live-video { width: 100%; display: block; max-height: 50vh; object-fit: cover; }
.cam-guide { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
.cam-box { width: 85%; height: 60%; border: 2px solid rgba(255,255,255,0.4); border-radius: 8px; position: relative; }
.cam-box::before, .cam-box::after { content: ''; position: absolute; width: 18px; height: 18px; border-color: #4ade80; border-style: solid; }
.cam-box::before { top: -2px; left: -2px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
.cam-box::after  { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
.cam-box .c2 { position: absolute; top: -2px; right: -2px; width: 18px; height: 18px; border-color: #4ade80; border-style: solid; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
.cam-box .c3 { position: absolute; bottom: -2px; left: -2px; width: 18px; height: 18px; border-color: #4ade80; border-style: solid; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
.cam-label { position: absolute; bottom: 10px; left: 0; right: 0; text-align: center; color: rgba(255,255,255,0.8); font-size: 11px; }

/* Progress */
.progress-wrap { background: var(--green-light); border-radius: 10px; padding: 12px 14px; margin-bottom: 12px; display: none; }
.progress-wrap.show { display: block; }
.progress-label { font-size: 13px; color: var(--green); font-weight: 500; margin-bottom: 6px; }
.progress-bar-bg { background: #c5e0d0; border-radius: 20px; height: 5px; overflow: hidden; }
.progress-bar { height: 100%; background: var(--green); border-radius: 20px; width: 0%; transition: width 0.3s; }

/* Patient fields */
.patient-box { background: var(--green-light); border: 1px solid #c5e0d0; border-radius: 12px; padding: 14px; margin-bottom: 14px; }
.field-label { font-size: 11px; font-weight: 600; color: var(--green); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.opt { font-weight: 400; color: var(--text3); text-transform: none; }
.field-input { width: 100%; padding: 10px 12px; border: 1px solid #c5e0d0; border-radius: 8px; font-size: 15px; font-family: inherit; background: #fff; color: var(--text); margin-bottom: 10px; }
.field-input:focus { outline: none; border-color: var(--green); }
.field-input:last-child { margin-bottom: 0; }

/* Rx rows */
.rx-item { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 8px; }
.rx-code { font-family: monospace; font-size: 14px; font-weight: 600; color: var(--green); }
.rx-dates { font-size: 12px; color: var(--text2); margin-top: 4px; }
.rx-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
.rx-input { font-family: monospace; font-size: 12px; padding: 7px 9px; border: 1px solid var(--border); border-radius: 7px; background: #fff; width: 100%; color: var(--text); }
.rx-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; font-weight: 500; margin-bottom: 3px; }
.rx-num-input { width: 100%; font-family: monospace; font-size: 12px; padding: 7px 9px; border: 1px solid var(--border); border-radius: 7px; background: #fff; color: var(--text); margin-top: 6px; }
.rm-btn { background: none; border: none; color: var(--text3); font-size: 20px; cursor: pointer; padding: 2px 4px; float: right; }

/* Manual row */
.manual-row { display: flex; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
.manual-row input { flex: 1; padding: 10px 12px; border: 1px solid var(--border); border-radius: 9px; font-size: 13px; font-family: monospace; color: var(--text); background: #fff; }

/* Barcode preview */
.bc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.bc-card { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 10px; text-align: center; }
.bc-card canvas { max-width: 100%; }
.bc-num { font-family: monospace; font-size: 10px; font-weight: 600; margin-top: 4px; }
.bc-dates { font-size: 10px; color: var(--text2); margin-top: 2px; line-height: 1.5; }
.bc-idx { font-size: 9px; color: var(--text3); margin-bottom: 3px; }

/* OCR side panel */
.scan-split { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.split-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.ocr-result-item { background: var(--green-light); border: 1px solid #c5e0d0; border-radius: 8px; padding: 8px; margin-bottom: 6px; }
.ocr-result-code { font-family: monospace; font-size: 11px; font-weight: 600; color: var(--green); word-break: break-all; }
.ocr-result-date { font-size: 10px; color: var(--text2); margin-top: 2px; }

/* Status */
.status { padding: 10px 14px; border-radius: 9px; font-size: 13px; margin-bottom: 10px; display: none; }
.status.info { background: #e8f0fe; color: #1a56c4; display: block; }
.status.ok   { background: var(--green-light); color: var(--green); display: block; }
.status.err  { background: #fff0f0; color: var(--danger); display: block; }

/* History */
.hist-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); }
.hist-row:last-child { border-bottom: none; }
.hist-ts { font-size: 11px; color: var(--text3); }
.badge { background: var(--green-light); color: var(--green); border-radius: 20px; padding: 2px 9px; font-size: 11px; font-weight: 600; }

/* Bottom nav */
.nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(8px); border-top: 1px solid var(--border); display: flex; }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 8px 0 6px; font-size: 9px; color: var(--text3); font-weight: 500; border: none; background: none; font-family: inherit; cursor: pointer; }
.nav-btn.active { color: var(--green); }
.nav-icon { font-size: 20px; margin-bottom: 2px; }

/* Empty */
.empty { text-align: center; padding: 30px 16px; color: var(--text3); }
.empty-icon { font-size: 36px; margin-bottom: 8px; }

/* Toast */
.toast { position: fixed; bottom: 74px; left: 14px; right: 14px; background: #1a1a2e; color: #fff; padding: 12px 16px; border-radius: 10px; font-size: 14px; text-align: center; transform: translateY(20px); opacity: 0; transition: all 0.3s; z-index: 999; }
.toast.show { transform: translateY(0); opacity: 1; }
.toast.ok  { background: var(--green); }
.toast.err { background: var(--danger); }

/* Print */
#print-zone { display: none; }
@media print {
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  html, body { height: auto !important; overflow: visible !important; margin: 0 !important; padding: 0 !important; }
  body > *:not(#print-zone) { display: none !important; }
  #print-zone {
    display: block !important;
    position: absolute !important;
    top: 0; left: 0; width: 100%;
    font-family: Arial, sans-serif;
    padding: 10px;
  }
  .pz-header { display: flex; justify-content: space-between; border-bottom: 2px solid #1a5f3f; padding-bottom: 8px; margin-bottom: 10px; }
  .pz-title { font-size: 14px; font-weight: 700; color: #1a5f3f; }
  .pz-meta { font-size: 10px; color: #444; text-align: right; line-height: 1.6; }
  .pz-patient { background: #f0f7f3; padding: 6px 10px; font-size: 11px; margin-bottom: 10px; display: flex; gap: 20px; }
  .pz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .pz-card { border: 1px solid #ccc; padding: 8px; text-align: center; break-inside: avoid; }
  .pz-card canvas { max-width: 100%; height: auto; display: block; margin: 0 auto; }
  .pz-idx  { font-size: 9px; color: #888; margin-bottom: 3px; }
  .pz-code { font-family: 'Courier New', monospace; font-size: 10px; font-weight: 700; margin-top: 4px; }
  .pz-dates { font-size: 10px; color: #444; margin-top: 2px; line-height: 1.5; }
}

input[type=file] { display: none; }
label.btn-big { display: flex; }
label.btn { display: inline-flex; }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">💊</div>
  <div>
    <h1>Συνταγές ΙΔΙΚΑ</h1>
    <p>Σάρωση · Barcodes · Εκτύπωση</p>
  </div>
</div>

<!-- ═══ SCREEN: SCAN ═══ -->
<div class="screen active" id="screen-scan">

  <div class="progress-wrap" id="prog-wrap">
    <div class="progress-label" id="prog-label">Ανάλυση...</div>
    <div class="progress-bar-bg"><div class="progress-bar" id="prog-bar"></div></div>
  </div>

  <!-- Initial buttons -->
  <div id="btns-initial">
    <button class="btn-big" id="btn-open-cam">📷 Άνοιγμα Κάμερας</button>
    <label for="inp-camera" class="btn-big" style="background:#2d6a50;">📸 Λήψη Φωτογραφίας</label>
    <label for="inp-gallery" class="btn btn-full" style="width:100%;margin-bottom:8px;">🖼 Από Γκαλερί</label>
    <div class="manual-row">
      <input type="number" id="inp-manual" placeholder="Χειρ. εισαγωγή αριθμού (16 ψηφία)">
      <button class="btn primary" id="btn-add-manual">+</button>
    </div>
  </div>

  <!-- Live camera -->
  <div id="div-camera" style="display:none;">
    <div class="cam-wrap">
      <video id="live-video" autoplay playsinline muted></video>
      <div class="cam-guide">
        <div class="cam-box">
          <div class="c2"></div><div class="c3"></div>
        </div>
      </div>
      <div class="cam-label">Κεντράρετε το SMS μέσα στο πλαίσιο</div>
    </div>
    <button class="btn-big" id="btn-shoot">📸 Λήψη</button>
    <button class="btn btn-full" id="btn-close-cam">✕ Κλείσιμο</button>
  </div>

  <!-- Photo preview + results -->
  <div id="div-preview" style="display:none;">
    <div class="btn-row" style="margin-bottom:10px;">
      <button class="btn" id="btn-retake">🔄 Νέα</button>
      <button class="btn primary" id="btn-analyze" style="flex:3;">🔍 Ανάλυση</button>
    </div>
    <div class="scan-split">
      <div>
        <div class="split-label">Φωτογραφία</div>
        <img id="photo-preview" style="width:100%;border-radius:8px;border:1px solid var(--border);">
      </div>
      <div>
        <div class="split-label">Αναγνωρίστηκαν</div>
        <div id="ocr-panel"><div style="color:var(--text3);font-size:12px;padding:8px 0;">Πατήστε Ανάλυση</div></div>
      </div>
    </div>
    <div class="status" id="status-scan"></div>
    <button class="btn-big" id="btn-proceed" style="display:none;margin-top:8px;">✅ Προχώρηση →</button>
  </div>

  <input type="file" id="inp-camera" accept="image/*" capture="environment">
  <input type="file" id="inp-gallery" accept="image/*">
</div>

<!-- ═══ SCREEN: REVIEW ═══ -->
<div class="screen" id="screen-review">
  <div class="patient-box">
    <div class="field-label">Ασθενής <span class="opt">(προαιρετικό)</span></div>
    <input type="text" class="field-input" id="inp-name" placeholder="Ονοματεπώνυμο">
    <div class="field-label">ΑΜΚΑ <span class="opt">(προαιρετικό)</span></div>
    <input type="text" class="field-input" id="inp-amka" placeholder="ΑΜΚΑ" maxlength="11">
  </div>
  <div class="card">
    <div class="card-head">
      <span>Συνταγές</span>
      <span class="badge" id="rx-count">0</span>
    </div>
    <div class="card-body">
      <div id="rx-list"><div class="empty"><div class="empty-icon">📋</div><p>Καμία συνταγή ακόμα</p></div></div>
      <div class="manual-row">
        <input type="number" id="inp-manual2" placeholder="Προσθήκη αριθμού">
        <button class="btn primary" id="btn-add-manual2">+</button>
      </div>
    </div>
  </div>
  <button class="btn-big" id="btn-go-print" disabled>Προεπισκόπηση & Εκτύπωση →</button>
  <div class="btn-row">
    <button class="btn btn-full" id="btn-back-scan">← Νέα Σάρωση</button>
  </div>
</div>

<!-- ═══ SCREEN: PRINT ═══ -->
<div class="screen" id="screen-print">
  <div class="status" id="status-print"></div>
  <div class="card">
    <div class="card-head">Προεπισκόπηση</div>
    <div class="card-body">
      <div class="bc-grid" id="bc-preview"></div>
    </div>
  </div>
  <button class="btn-big" id="btn-print">🖨 Εκτύπωση</button>
  <div class="btn-row">
    <button class="btn" id="btn-back-review">← Πίσω</button>
    <button class="btn" id="btn-new-rx">🔄 Νέα</button>
  </div>
</div>

<!-- ═══ SCREEN: HISTORY ═══ -->
<div class="screen" id="screen-history">
  <div class="card">
    <div class="card-head">
      <span>Ιστορικό</span>
      <button class="btn" id="btn-clear-hist" style="padding:4px 8px;font-size:11px;">Καθαρισμός</button>
    </div>
    <div id="hist-list"><div class="empty"><div class="empty-icon">📜</div><p>Δεν υπάρχουν εκτυπώσεις</p></div></div>
  </div>
</div>

<!-- Bottom nav -->
<div class="nav">
  <button class="nav-btn active" data-s="scan"><div class="nav-icon">📷</div>Σάρωση</button>
  <button class="nav-btn" data-s="review"><div class="nav-icon">✅</div>Έλεγχος</button>
  <button class="nav-btn" data-s="print"><div class="nav-icon">🖨</div>Εκτύπωση</button>
  <button class="nav-btn" data-s="history"><div class="nav-icon">📜</div>Ιστορικό</button>
</div>

<!-- Print zone -->
<div id="print-zone"></div>

<div class="toast" id="toast"></div>

<script>
'use strict';

// ── State ──────────────────────────────────────────────────────────
const state = {
  prescriptions: [],
  liveStream: null,
  photoData: null,
  history: JSON.parse(localStorage.getItem('ph_hist') || '[]')
};

const VISION_KEY = 'AIzaSyA1bD5akYimOEtE9SMvVi6vqTPJgkb1yw4';

// ── Utils ──────────────────────────────────────────────────────────
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + (type || '');
  setTimeout(() => el.className = 'toast', 3000);
}

function setStatus(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'status ' + type;
}

function parseDate(s) {
  if (!s) return null;
  const p = s.split('/');
  return p.length === 3 ? new Date(+p[2], +p[1]-1, +p[0]) : null;
}

function sortRx() {
  state.prescriptions.sort((a, b) => {
    const da = parseDate(a.ekdosi), db = parseDate(b.ekdosi);
    if (!da && !db) return 0;
    if (!da) return 1;
    if (!db) return -1;
    return da - db;
  });
}

// ── Navigation ─────────────────────────────────────────────────────
function goTo(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.querySelector('[data-s="' + name + '"]').classList.add('active');
  if (name === 'print') buildPreview();
  if (name === 'history') renderHistory();
}

document.querySelectorAll('.nav-btn').forEach(b => {
  b.addEventListener('click', () => goTo(b.dataset.s));
});

document.getElementById('btn-back-scan').addEventListener('click', () => goTo('scan'));
document.getElementById('btn-back-review').addEventListener('click', () => goTo('review'));
document.getElementById('btn-go-print').addEventListener('click', () => goTo('print'));
document.getElementById('btn-new-rx').addEventListener('click', () => {
  state.prescriptions = [];
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-amka').value = '';
  renderRxList();
  resetScanScreen();
  goTo('scan');
});

// ── Scan screen states ─────────────────────────────────────────────
function showInitial() {
  document.getElementById('btns-initial').style.display = 'block';
  document.getElementById('div-camera').style.display = 'none';
  document.getElementById('div-preview').style.display = 'none';
  stopCamera();
}

function showCamera() {
  document.getElementById('btns-initial').style.display = 'none';
  document.getElementById('div-camera').style.display = 'block';
  document.getElementById('div-preview').style.display = 'none';
}

function showPreview(dataUrl) {
  state.photoData = dataUrl;
  document.getElementById('photo-preview').src = dataUrl;
  document.getElementById('btns-initial').style.display = 'none';
  document.getElementById('div-camera').style.display = 'none';
  document.getElementById('div-preview').style.display = 'block';
  document.getElementById('ocr-panel').innerHTML = '<div style="color:var(--text3);font-size:12px;padding:8px 0;">Πατήστε Ανάλυση</div>';
  document.getElementById('btn-proceed').style.display = 'none';
  document.getElementById('status-scan').className = 'status';
  stopCamera();
}

function resetScanScreen() {
  showInitial();
}

// ── Camera ─────────────────────────────────────────────────────────
document.getElementById('btn-open-cam').addEventListener('click', async () => {
  try {
    state.liveStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
    });
    document.getElementById('live-video').srcObject = state.liveStream;
    showCamera();
  } catch(e) {
    toast('Σφάλμα κάμερας: ' + e.message, 'err');
  }
});

document.getElementById('btn-close-cam').addEventListener('click', showInitial);
document.getElementById('btn-retake').addEventListener('click', showInitial);

document.getElementById('btn-shoot').addEventListener('click', () => {
  const video = document.getElementById('live-video');
  const c = document.createElement('canvas');
  c.width = video.videoWidth;
  c.height = video.videoHeight;
  c.getContext('2d').drawImage(video, 0, 0);
  showPreview(c.toDataURL('image/jpeg', 0.95));
});

function stopCamera() {
  if (state.liveStream) {
    state.liveStream.getTracks().forEach(t => t.stop());
    state.liveStream = null;
  }
  document.getElementById('live-video').srcObject = null;
}

// ── File inputs ────────────────────────────────────────────────────
function handleFile(e) {
  const f = e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = ev => showPreview(ev.target.result);
  r.readAsDataURL(f);
  e.target.value = '';
}

document.getElementById('inp-camera').addEventListener('change', handleFile);
document.getElementById('inp-gallery').addEventListener('change', handleFile);

// ── OCR via Google Vision ──────────────────────────────────────────
document.getElementById('btn-analyze').addEventListener('click', runOCR);

async function runOCR() {
  const prog = document.getElementById('prog-wrap');
  const label = document.getElementById('prog-label');
  const bar = document.getElementById('prog-bar');

  prog.classList.add('show');
  label.textContent = 'Αποστολή στο Google Vision...';
  bar.style.width = '20%';
  document.getElementById('btn-analyze').disabled = true;
  document.getElementById('status-scan').className = 'status';

  try {
    const base64 = state.photoData.split(',')[1];
    bar.style.width = '40%';

    const res = await fetch(
      'https://vision.googleapis.com/v1/images:annotate?key=' + VISION_KEY,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          requests: [{
            image: { content: base64 },
            features: [{ type: 'TEXT_DETECTION', maxResults: 1 }],
            imageContext: { languageHints: ['el', 'en'] }
          }]
        })
      }
    );

    bar.style.width = '80%';
    const data = await res.json();

    if (data.error) throw new Error(data.error.message);

    const rawText = data.responses?.[0]?.fullTextAnnotation?.text || '';
    console.log('Vision text:', rawText);

    bar.style.width = '100%';
    setTimeout(() => { prog.classList.remove('show'); bar.style.width = '0%'; }, 500);

    const found = extractRx(rawText);

    if (found.length > 0) {
      showOCRResults(found);
    } else {
      setStatus('status-scan', '⚠️ Δεν βρέθηκαν αριθμοί. Δοκιμάστε πιο κοντά με καλό φωτισμό.', 'err');
      document.getElementById('ocr-panel').innerHTML = '<div style="color:var(--danger);font-size:12px;">Δεν βρέθηκε τίποτα</div>';
    }

  } catch(e) {
    prog.classList.remove('show');
    setStatus('status-scan', '❌ Σφάλμα: ' + e.message, 'err');
    console.error(e);
  }

  document.getElementById('btn-analyze').disabled = false;
}

// ── Extract prescriptions ──────────────────────────────────────────
function extractRx(text) {
  const found = [];
  const norm = text
    .replace(/[oO]/g, '0')
    .replace(/[lI|]/g, '1')
    .replace(/[sS]/g, '5')
    .replace(/[bB]/g, '8')
    .replace(/[zZ]/g, '2');

  const codes = [];
  const dateRx = /(\d{2}\/\d{2}\/\d{4})/g;

  // Find codes: # + digits in both original and normalized
  for (const src of [text, norm]) {
    const r1 = /#\s*(\d{10,16})/g;
    const r2 = /(?<!\d)(\d{16})(?!\d)/g;
    let m;
    while ((m = r1.exec(src)) !== null)
      if (!codes.find(c => c.code === m[1])) codes.push({ code: m[1], pos: m.index });
    while ((m = r2.exec(src)) !== null)
      if (!codes.find(c => c.code === m[1])) codes.push({ code: m[1], pos: m.index });
  }

  codes.sort((a, b) => a.pos - b.pos);

  // Find dates
  const dates = [];
  let m;
  while ((m = dateRx.exec(text)) !== null) dates.push({ date: m[1], pos: m.index });

  codes.forEach(c => {
    const next = dates.filter(d => d.pos > c.pos).slice(0, 2);
    found.push({ code: c.code, ekdosi: next[0]?.date || '', lixis: next[1]?.date || '' });
  });

  return found;
}

// ── Show OCR results in side panel ────────────────────────────────
function showOCRResults(found) {
  const panel = document.getElementById('ocr-panel');
  panel.innerHTML = found.map((p, i) => `
    <div class="ocr-result-item">
      <div class="ocr-result-code">${p.code}</div>
      ${p.ekdosi ? '<div class="ocr-result-date">📅 ' + p.ekdosi + '</div>' : ''}
      ${p.lixis  ? '<div class="ocr-result-date">⏰ ' + p.lixis  + '</div>' : ''}
    </div>
  `).join('');

  const btn = document.getElementById('btn-proceed');
  btn.style.display = 'block';
  btn.onclick = () => {
    found.forEach(p => {
      if (!state.prescriptions.find(x => x.code === p.code)) state.prescriptions.push(p);
    });
    sortRx();
    renderRxList();
    toast('✅ ' + found.length + ' συνταγές προστέθηκαν', 'ok');
    resetScanScreen();
    goTo('review');
  };
}

// ── Manual entry ───────────────────────────────────────────────────
function addManual(inputId) {
  const inp = document.getElementById(inputId);
  const val = inp.value.trim();
  if (!/^\d{10,16}$/.test(val)) { toast('Εισάγετε 10-16 ψηφία', 'err'); return; }
  if (state.prescriptions.find(p => p.code === val)) { toast('Υπάρχει ήδη', 'err'); return; }
  state.prescriptions.push({ code: val, ekdosi: '', lixis: '' });
  sortRx();
  renderRxList();
  inp.value = '';
  toast('Προστέθηκε!', 'ok');
  goTo('review');
}

document.getElementById('btn-add-manual').addEventListener('click', () => addManual('inp-manual'));
document.getElementById('btn-add-manual2').addEventListener('click', () => addManual('inp-manual2'));
document.getElementById('inp-manual').addEventListener('keydown', e => { if (e.key === 'Enter') addManual('inp-manual'); });
document.getElementById('inp-manual2').addEventListener('keydown', e => { if (e.key === 'Enter') addManual('inp-manual2'); });

// ── Rx list render ─────────────────────────────────────────────────
function renderRxList() {
  const list = document.getElementById('rx-list');
  const count = document.getElementById('rx-count');
  const btn = document.getElementById('btn-go-print');

  count.textContent = state.prescriptions.length;
  btn.disabled = state.prescriptions.length === 0;

  if (!state.prescriptions.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><p>Καμία συνταγή ακόμα</p></div>';
    return;
  }

  list.innerHTML = state.prescriptions.map((p, i) => `
    <div class="rx-item">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div class="rx-code">#${p.code}</div>
        <button class="rm-btn" onclick="removeRx(${i})">✕</button>
      </div>
      <div style="margin-top:6px;">
        <div class="rx-lbl">Αριθμός</div>
        <input class="rx-num-input" value="${p.code}" onchange="state.prescriptions[${i}].code=this.value" maxlength="16">
      </div>
      <div class="rx-inputs">
        <div>
          <div class="rx-lbl">Έκδοση</div>
          <input class="rx-input" value="${p.ekdosi}" placeholder="ΗΗ/ΜΜ/ΕΕΕΕ" onchange="state.prescriptions[${i}].ekdosi=this.value;sortRx();renderRxList()">
        </div>
        <div>
          <div class="rx-lbl">Λήξη</div>
          <input class="rx-input" value="${p.lixis}" placeholder="ΗΗ/ΜΜ/ΕΕΕΕ" onchange="state.prescriptions[${i}].lixis=this.value">
        </div>
      </div>
    </div>
  `).join('');
}

function removeRx(i) {
  state.prescriptions.splice(i, 1);
  renderRxList();
}

// ── Build barcode preview ──────────────────────────────────────────
function buildPreview() {
  const grid = document.getElementById('bc-preview');
  if (!state.prescriptions.length) {
    grid.innerHTML = '<div class="empty"><p>Δεν υπάρχουν συνταγές</p></div>';
    return;
  }
  grid.innerHTML = state.prescriptions.map((p, i) => `
    <div class="bc-card">
      <div class="bc-idx">Συνταγή ${i+1}/${state.prescriptions.length}</div>
      <canvas id="bc${i}"></canvas>
      <div class="bc-num">${p.code}</div>
      <div class="bc-dates">${p.ekdosi ? 'Έκδοση: '+p.ekdosi : ''}${p.ekdosi&&p.lixis?'<br>':''}${p.lixis ? 'Λήξη: '+p.lixis : ''}</div>
    </div>
  `).join('');

  setTimeout(() => {
    state.prescriptions.forEach((p, i) => {
      try {
        JsBarcode('#bc' + i, p.code, { format:'CODE128', lineColor:'#000', width:1.5, height:55, displayValue:false, background:'#fff', margin:4 });
      } catch(e) { console.error(e); }
    });
    buildPrintZone();
  }, 100);
}

// ── Build print zone ───────────────────────────────────────────────
function buildPrintZone() {
  const name = document.getElementById('inp-name').value.trim();
  const amka = document.getElementById('inp-amka').value.trim();
  const now  = new Date().toLocaleDateString('el-GR') + ' ' + new Date().toLocaleTimeString('el-GR', {hour:'2-digit',minute:'2-digit'});

  let cards = state.prescriptions.map((p, i) => `
    <div class="pz-card">
      <div class="pz-idx">Συνταγή ${i+1} από ${state.prescriptions.length}</div>
      <canvas id="pbc${i}"></canvas>
      <div class="pz-code">${p.code}</div>
      <div class="pz-dates">${p.ekdosi?'Έκδοση: '+p.ekdosi:''}${p.ekdosi&&p.lixis?'<br>':''}${p.lixis?'Λήξη: '+p.lixis:''}</div>
    </div>
  `).join('');

  document.getElementById('print-zone').innerHTML = `
    <div class="pz-header">
      <div><div class="pz-title">Φαρμακείο — Συνταγές ΙΔΙΚΑ</div></div>
      <div class="pz-meta">Εκτύπωση: ${now}${name?'<br>Ασθενής: '+name:''}${amka?'<br>ΑΜΚΑ: '+amka:''}</div>
    </div>
    ${(name||amka) ? `<div class="pz-patient">${name?'<span><b>Ασθενής:</b> '+name+'</span>':''}${amka?'<span><b>ΑΜΚΑ:</b> '+amka+'</span>':''}</div>` : ''}
    <div class="pz-grid">${cards}</div>
  `;

  setTimeout(() => {
    state.prescriptions.forEach((p, i) => {
      try {
        JsBarcode('#pbc' + i, p.code, { format:'CODE128', lineColor:'#000', width:1.8, height:65, displayValue:false, background:'#fff', margin:4 });
      } catch(e) {}
    });
  }, 150);
}

// ── Print ──────────────────────────────────────────────────────────
document.getElementById('btn-print').addEventListener('click', () => {
  buildPrintZone();
  setTimeout(() => {
    const entry = {
      ts: new Date().toLocaleDateString('el-GR') + ' ' + new Date().toLocaleTimeString('el-GR',{hour:'2-digit',minute:'2-digit'}),
      count: state.prescriptions.length,
      patient: document.getElementById('inp-name').value.trim() || '—'
    };
    state.history.unshift(entry);
    if (state.history.length > 50) state.history.pop();
    localStorage.setItem('ph_hist', JSON.stringify(state.history));
    window.print();
  }, 400);
});

// ── History ────────────────────────────────────────────────────────
function renderHistory() {
  const list = document.getElementById('hist-list');
  if (!state.history.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">📜</div><p>Δεν υπάρχουν εκτυπώσεις</p></div>';
    return;
  }
  list.innerHTML = state.history.map(h => `
    <div class="hist-row">
      <div><div style="font-weight:500;font-size:14px;">${h.patient}</div><div class="hist-ts">${h.ts}</div></div>
      <span class="badge">${h.count} συνταγ${h.count===1?'ή':'ές'}</span>
    </div>
  `).join('');
}

document.getElementById('btn-clear-hist').addEventListener('click', () => {
  state.history = [];
  localStorage.setItem('ph_hist', '[]');
  renderHistory();
  toast('Καθαρίστηκε', 'ok');
});
</script>
</body>
